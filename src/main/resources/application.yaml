spring:
  docker:
    compose:
      enabled: true

  application:
    name: Spring-Boot-User-Manager

  config:
    import:
      - secrets.yaml

  jpa:
    properties:
      hibernate:
        hbm2ddl:
          create_namespaces: true #load schemas before create tables CREATE IF EXISTS
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  # ─────────────────────────────────────────────────────────────
  # RabbitMQ — conexión del suscriptor con la cola
  # ─────────────────────────────────────────────────────────────
  # El host es el nombre del servicio en compose.yaml (spring-queue)
  # porque la app corre dentro del contenedor Docker y RabbitMQ
  # es otro contenedor en la misma red Docker.
  #
  # Si ejecutás la app fuera de Docker (localhost nativo), comentá
  # las líneas de abajo y descomentá las alternativas.
  rabbitmq:
    host: spring-queue
    port: 5672
    username: admin
    password: admin123
    # host: localhost          # ← descomentar para ejecución local
    # port: 5672
    # username: admin
    # password: admin123

springdoc:
  swagger-ui:
    path: /swagger-ui.html

# ─────────────────────────────────────────────────────────────
# Webhook publisher → suscriptor
# ─────────────────────────────────────────────────────────────
# URL del endpoint suscriptor al que WebhookPublisher envía los POST.
# En Docker, cambiar a: http://spring-api:8080/api/v1/webhook/delivery
# (spring-api es el nombre del servicio en compose.yaml)
webhook:
  suscriptor:
    url: http://localhost:8080/api/v1/webhook/delivery
