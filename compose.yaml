services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '8080:8080'
    depends_on:
      - postgres

  postgres:
    image: postgres:18.3
    restart: unless-stopped
    volumes:
      - postgres-data-spring:/var/lib/postgresql
    deploy:
      resources:
        limits:
          cpus: 2
          memory: 4G
    env_file:
      - compose.env
    ports:
      - target: 5432
        published: 5432
        host_ip: "127.0.0.1"
        protocol: tcp
    
volumes:
  postgres-data-spring: